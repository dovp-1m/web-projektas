version: '3.8'

services:

  # ── PHP + Apache ────────────────────────────────────────────
  app:
    build: ./docker
    container_name: blogcms_app
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    environment:
      DB_HOST: db
      DB_NAME: blogcms
      DB_USER: blogcms
      DB_PASS: secret
    depends_on:
      db:
        condition: service_healthy

  # ── MySQL 8 ─────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: blogcms_db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: blogcms
      MYSQL_USER: blogcms
      MYSQL_PASSWORD: secret
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "blogcms", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── phpMyAdmin (optional, dev convenience) ──────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: blogcms_pma
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: rootsecret
    depends_on:
      - db

volumes:
  db_data:
